# Referencias reutilizables para artículos del blog.
# Accesibles en templates con: site.data.references
# En el frontmatter de cada post declarar los ids usados: references: [id1, id2]

- id: christensen-innovators-dilemma
  type: book
  authors:
    - family: Christensen
      given: Clayton M.
  year: 1997
  title: "The Innovator's Dilemma: When New Technologies Cause Great Firms to Fail"
  publisher: Harvard Business School Press
  tags: [innovation, strategy, technology, disruption]
  usage: >
    Argumentar que comprar software estandarizado nivela con la competencia (el promedio),
    mientras que construir in-house es lo que habilita el diferencial de mercado y la disrupción.

- id: kim-phoenix-project
  type: book
  authors:
    - family: Kim
      given: Gene
    - family: Behr
      given: Kevin
    - family: Spafford
      given: George
  year: 2013
  title: "The Phoenix Project: A Novel About IT, DevOps, and Helping Your Business Win"
  publisher: IT Revolution Press
  tags: [devops, it-management, strategy, business]
  usage: >
    Ilustrar que IT no es un departamento aislado de soporte, sino el núcleo operativo
    del negocio. Apoya la tesis de que la tecnología es el sistema nervioso de la empresa.

- id: conway-committees
  type: article
  authors:
    - family: Conway
      given: Melvin E.
  year: 1968
  title: "How Do Committees Invent?"
  source: Datamation
  volume: 14
  issue: 4
  pages: 28–31
  tags: [software-architecture, organization, technology, build-vs-buy]
  usage: >
    Citar la Ley de Conway para explicar que una empresa ágil necesita software construido
    ágilmente. Comprar software rígido impone rigidez organizacional.

- id: cunningham-technical-debt
  type: conference
  authors:
    - family: Cunningham
      given: Ward
  year: 1992
  title: "The WyCash Portfolio Management System"
  source: "OOPSLA '92 Experience Report"
  tags: [technical-debt, software, architecture, legacy]
  usage: >
    Origen del término "Deuda Técnica". Úsalo para explicar que los biomas aislados,
    planillas desconectadas y parches acumulados son una deuda con intereses crecientes.

- id: gartner-composable-business
  type: report
  authors:
    - family: Gartner
  year: 2020
  title: "The Future of Business is Composable"
  publisher: Gartner
  tags: [strategy, architecture, apis, composable, build-vs-buy]
  usage: >
    Marco corporativo que valida la idea de construir con APIs y módulos intercambiables
    en lugar de comprar monolitos. Las empresas resilientes se arman con bloques que
    pueden cambiarse sin romper el sistema.

- id: forrester-build-buy-partner
  type: framework
  authors:
    - family: Forrester Research
  title: "The Build-Buy-Partner Spectrum"
  tags: [strategy, build-vs-buy, technology, sourcing]
  usage: >
    Reemplaza el debate binario construir/comprar por un modelo híbrido: comprar los
    commodities (infraestructura, nube, pagos) para poder construir lo que es único
    (la lógica de negocio propia).

- id: vendor-lock-in
  type: concept
  title: "Vendor Lock-in"
  tags: [technology, strategy, risk, build-vs-buy, sourcing]
  definition: >
    Situación en la que el costo —económico, técnico u operativo— de cambiar de proveedor
    es tan alto que el cliente queda atrapado, independientemente de la calidad del servicio.
  usage: >
    "El software propietario cerrado es una cárcel donde el alquiler sube cada año
    y no puedes derribar las paredes para ampliar la casa."

- id: shadow-it
  type: concept
  title: "Shadow IT"
  tags: [technology, organization, it-management, symptoms]
  definition: >
    Uso de sistemas, dispositivos, software y aplicaciones dentro de una organización
    sin la aprobación explícita del departamento de TI (por ejemplo: Excel masivo,
    Trello personal, Zapier sin control).
  usage: >
    No demonizarlo: presentarlo como un síntoma. "El Shadow IT es la prueba de que
    el equipo necesita herramientas ágiles que la empresa no le está dando de forma oficial."

- id: kpmg-chatgpt-impact-2023
  type: report
  authors:
    - family: KPMG
  year: 2023
  title: "The potential impact of ChatGPT and the new AI on business"
  publisher: KPMG
  tags: [ai, chatgpt, tipping-point, llm, technology-adoption]
  usage: >
    Valida que ChatGPT fue el "punto de inflexión en la imaginación popular" tras años
    de modelos de lenguaje (GPT-3, 2020) conocidos solo por investigadores. Antes de
    noviembre de 2022, los LLM no lograban tracción masiva ni comprensión clara de su
    utilidad empresarial. Citar cuando se argumente que OpenAI no convenció al mundo
    con sus modelos hasta que publicaron la interfaz de chat.

- id: davenport-mission-critical
  type: book
  authors:
    - family: Davenport
      given: Thomas H.
  year: 2000
  title: "Mission Critical: Realizing the Promise of Enterprise Systems"
  publisher: Harvard Business Press
  tags: [erp, strategy, technology, legacy, accounting, enterprise-systems]
  usage: >
    Davenport argumenta que los ERP imponen una "lógica administrativa" donde cada
    transacción debe terminar en un asiento contable. Esto obliga a la empresa a
    modelar su realidad para que encaje en el libro mayor, sacrificando la riqueza
    de los procesos operativos no estrictamente financieros. Usar para respaldar
    que los ERP "se centraron en soluciones contables, perdiendo la universalidad
    de su ER: Enterprise Resources."

- id: gartner-postmodern-erp
  type: report
  authors:
    - family: Gartner
  year: 2014
  title: "Postmodern ERP"
  publisher: Gartner
  tags: [erp, strategy, architecture, legacy, accounting, composable]
  usage: >
    Gartner acuñó "Post-Modern ERP" para describir el colapso del ERP monolítico:
    los sistemas tradicionales se convirtieron en arquitecturas de control financiero
    tan rígidas que perdieron la capacidad de adaptarse a la universalidad de los
    recursos empresariales (talento, datos en tiempo real, activos digitales). Usar
    junto a Davenport (2000) para validar que el ERP priorizó el control contable
    por sobre la agilidad operativa.

- id: ciborra-control-to-drift
  type: book
  authors:
    - family: Ciborra
      given: Claudio
  year: 2000
  title: "From Control to Drift: The Dynamics of Corporate Information Infrastructures"
  publisher: Oxford University Press
  tags: [erp, organization, technology, legacy, fragmentation, infrastructure]
  usage: >
    Ciborra estudia cómo los ERP fallan al estandarizar organizaciones diversas.
    Su concepto de "panóptico financiero" describe que el modelo ER de los ERP
    jerarquiza las relaciones para el reporting financiero, relegando datos críticos
    de producción o de clientes a segundo plano si no impactan el balance. Mejor
    usado en artículos sobre biomas tecnológicos fragmentados y deuda técnica
    organizacional.

- id: johnson-adjacent-possible
  type: book
  authors:
    - family: Johnson
      given: Steven
  year: 2010
  title: "Where Good Ideas Come From: The Natural History of Innovation"
  publisher: Riverhead Books
  tags: [innovation, strategy, technology, adjacent-possible, build-vs-buy]
  quote: >
    "La innovación es un rompecabezas de piezas que ya están sobre la mesa.
    Solo en los límites de ese mapa podemos encontrar una pieza nueva."
  usage: >
    El concepto de "lo posible adyacente" (originado en Stuart Kauffman, popularizado
    por Johnson) explica que la innovación genuina solo ocurre en la frontera de lo que
    ya existe: no podés inventar la computadora en la Edad Media porque no tenés las piezas.
    Usar cuando se argumente que "muy pocas soluciones son novedosas, excepto que se esté
    en los límites de la tecnología" — la novedad real exige estar parado en el borde del
    mapa actual, no en el centro.

- id: dimon-jpmorgan-letter-2022
  type: letter
  authors:
    - family: Dimon
      given: Jamie
  year: 2022
  title: "Annual Letter to Shareholders"
  publisher: JPMorgan Chase & Co.
  tags: [case-study, strategy, build-vs-buy, fintech, technology-investment]
  usage: >
    Jamie Dimon defiende una inversión de más de $12 mil millones anuales en tecnología
    propia para no delegar el futuro a terceros. Reemplazaron sistemas heredados de vendor
    por plataformas propias en la nube para competir con las Fintech. Argumento: si un
    banco gigante entiende que debe ser una empresa de tecnología, una PyME no puede
    darse el lujo de delegar sus reglas de negocio a un software genérico.
